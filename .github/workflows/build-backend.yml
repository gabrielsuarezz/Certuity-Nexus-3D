name: Build backend image

# Builds server/Dockerfile on GitHub's runners (which have Docker) and pushes the
# image to GitHub Container Registry (ghcr.io). This sidesteps ACR Tasks, which is
# disabled on Azure for Students. Azure Container Apps then pulls this image.

on:
  workflow_dispatch: {} # lets you re-run it from the Actions tab
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/build-backend.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/certuity-prism-api:latest
