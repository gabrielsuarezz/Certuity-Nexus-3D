# Render Blueprint — deploys the FastAPI agent backend (WebSockets + voice).
# Secrets are NOT stored here (sync:false) — you enter them in the Render
# dashboard after the service is created, so nothing sensitive is committed.
#
# Quickstart: push this repo to GitHub → Render → New → Blueprint → pick the repo.
services:
  - type: web
    name: certuity-prism-api
    runtime: python
    rootDir: server
    plan: free # upgrade to "starter" ($7/mo) to remove the free-tier cold-start sleep
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # --- non-secret config ---
      - key: USE_MOCK_LLM
        value: "false" # real Semantic Kernel brain
      - key: LLM_PROVIDER
        value: github # free GitHub Models (GPT-4o-mini); use "azure" for Azure OpenAI
      - key: DATA_SOURCE
        value: json # set "salesforce" + the SF_* secrets to show the live CRM
      - key: DEMO_CLIENT_ID
        value: a0R8d00000Smith1
      - key: AUDIT_LOG_PATH
        value: /tmp/audit.log.jsonl
      # --- secrets: set values in the Render dashboard (never committed) ---
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: ALLOWED_ORIGINS # set to your Vercel URL, e.g. https://certuity-prism.vercel.app
        sync: false
      # --- optional: real Prompt Shields (else a local heuristic is used) ---
      - key: AZURE_CONTENT_SAFETY_ENDPOINT
        sync: false
      - key: AZURE_CONTENT_SAFETY_KEY
        sync: false
